nodeLinker: hoisted

# Force a single, modern sharp across the whole tree (incl. @xenova/transformers,
# which declares ^0.32.0). sharp 0.32.x has no prebuilt for Node 24 on Windows and
# fails to build from source; 0.34.x uses the maintained @img/sharp-* prebuilt
# packages that support Node 24. pnpm 11 reads overrides from here, not package.json.
overrides:
  sharp: ^0.34.5

allowBuilds:
  esbuild: true
  protobufjs: true
  sharp: true
minimumReleaseAgeExclude:
  - axios@1.12.0
  - lodash@4.17.23
  - undici@7.18.2
  - diff@4.0.4
  - qs@6.14.2
  - hono@4.11.10
  - minimatch@3.1.3
  - minimatch@3.1.4
  - ajv@6.14.0
  - ajv@8.18.0
  - hono@4.12.4
  - '@hono/node-server@1.19.10'
  - express-rate-limit@8.2.2
  - hono@4.12.7
  - undici@7.24.0
  - brace-expansion@1.1.13
  - picomatch@2.3.2
  - path-to-regexp@8.4.0
  - lodash@4.17.24
  - hono@4.12.12
  - '@hono/node-server@1.19.13'
  - follow-redirects@1.15.12
  - hono@4.12.14
  - axios@1.15.0
  - postcss@8.5.10
  - protobufjs@7.5.5
  - axios@1.15.1
  - axios@1.15.2
  - uuid@11.1.1
  - axios@1.13.5
  - fast-uri@3.1.1
  - fast-uri@3.1.2
  - hono@4.12.18
  - protobufjs@7.5.6
  - ip-address@10.1.1
  - sanitize-html@2.17.4
  - '@protobufjs/utf8@1.1.1'
  - hono@4.12.16
onlyBuiltDependencies:
  - esbuild
  - protobufjs
  - sharp
